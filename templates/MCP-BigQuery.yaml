name: MCP-BigQuery
displayName: MCP-BigQuery
type: feature
categories: []
description: MCP-BigQuery
documentation: ""
parameters:
  - name: BasePath
    paths:
      - $.endpoints[:1].basePath
    description: The base path to offer the proxy on.
    default: /bigquery
    examples: []
endpoints:
  - name: default
    basePath: /bigquery
    routes:
      - name: default
        target: default
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: CORS-SetCors
          - name: PP-ParsePayload
          - name: VA-VerifyKey
          - name: AM-RemoveKey
          - name: Q-EnforceQuota
    faultRules: []
targets:
  - name: default
    url: https://bigquery.googleapis.com
    auth: GoogleAccessToken
    scopes:
      - https://www.googleapis.com/auth/cloud-platform
    flows: []
    faultRules: []
    httpTargetConnection:
      properties: {}
      url: https://bigquery.googleapis.com
      authentication:
        googleAccessToken:
          scopes:
            scope: https://www.googleapis.com/auth/cloud-platform
policies:
  - name: AM-RemoveKey
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-RemoveKey
        displayName: AM-RemoveKey
        properties: {}
        remove:
          headers:
            header:
              metadata:
                name: x-api-key
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: CORS-SetCors
    type: CORS
    content:
      cors:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: CORS-SetCors
        displayName: CORS-SetCors
        allowOrigins: "{request.header.origin}"
        allowMethods: GET, PUT, POST, DELETE
        allowHeaders: "*"
        exposeHeaders: "*"
        maxAge: "3628800"
        allowCredentials: "false"
        generatePreflightResponse: "true"
        ignoreUnresolvedVariables: "true"
  - name: PP-ParsePayload
    type: ParsePayload
    content:
      parsePayload:
        metadata:
          async: "false"
          continueOnError: "false"
          enabled: "true"
          name: PP-ParsePayload
        displayName: PP-ParsePayload
        source: request
        payloadType: JSON-RPC-2.0
        protocol: MCP
  - name: Q-EnforceQuota
    type: Quota
    content:
      quota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: Q-EnforceQuota
          type: calendar
        displayName: Q-EnforceQuota
        properties: {}
        useQuotaConfigInApiProduct:
          metadata:
            stepName: VA-VerifyKey
          defaultConfig:
            allow: "1000"
            interval: "1"
            timeUnit: minute
        distributed: "false"
        synchronous: "false"
        startTime: 2013-08-21 10:00:00
        asynchronousConfiguration:
          syncIntervalInSeconds: "20"
          syncMessageCount: "5"
  - name: VA-VerifyKey
    type: VerifyAPIKey
    content:
      verifyApiKey:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: VA-VerifyKey
        displayName: VA-VerifyKey
        properties: {}
        apiKey:
          metadata:
            ref: request.header.x-api-key
resources: []
tests: []
